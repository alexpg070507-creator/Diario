<style>
  :root{
    --cream:#FBF3E7;
    --cream-deep:#F1E4CC;

  *{ box-sizing:border-box; }

  html,body{

    padding:0;
    background:var(--cream);

    margin:0 auto;

  .site-header{

    align-items:center;
    gap:12px;
    padding-bottom:18px;
    margin-bottom:22px;
    border-bottom:1px solid var(--border);

    font-weight:600;
    font-size:26px;
    letter-spacing:0.2px;
    margin:0;
    color:var(--ink);
  }

  .site-header .tagline{
    margin:2px 0 0;
    font-size:14px;
    color:var(--ink-soft);
  }

  .mark{ flex-shrink:0; }

  .screen{
    animation:fadeIn .25s ease both;
  }

  }
  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

    font-family:'Fraunces', Georgia, serif;
    font-weight:600;
    font-size:22px;
    line-height:1.35;
    margin:0 0 20px;
    color:var(--ink);

    gap:14px;

    gap:16px;
    width:100%;
    text-align:left;
    background:var(--card);
    border:1px solid var(--border);

    font-size:19px;

    font-size:32px;
    line-height:1;
    flex-shrink:0;
  }

  .back-row{
    margin-bottom:18px;
  }

  .link-back{
    background:none;
    border:none;
    padding:8px 0;
    font-family:inherit;
    font-size:16px;
    font-weight:600;
    color:var(--gold-deep);
    cursor:pointer;
  }
  .link-back:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

  .field{
    margin-bottom:22px;
  }

  .field label{
    display:block;
    font-size:18px;
    font-weight:600;
    margin-bottom:8px;
    color:var(--ink);
  }

  .field textarea{
    width:100%;
    font-family:inherit;
    font-size:18px;
    line-height:1.4;
    color:var(--ink);
    background:var(--card);

  .note-card{
    display:flex;
    gap:10px;
    background:var(--cream-deep);
    border-left:4px solid var(--gold);
    border-radius:10px;
    padding:14px 16px;
    font-size:16px;
    line-height:1.45;
    color:var(--ink);
    margin-bottom:22px;
  }

  .actions{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-top:6px;
  }

  .action-button{
    width:100%;
    min-height:64px;
    border-radius:14px;
    font-family:inherit;
    font-size:19px;
    font-weight:700;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;

  .action-button:active{ transform:scale(0.98); }
  .action-button:focus-visible{ outline:3px solid var(--sage); outline-offset:2px; }

  .action-button.primary{
    background:var(--gold);
    color:var(--cream);
    border:none;
    box-shadow:var(--shadow);
  }
  .action-button.primary:hover{ background:var(--gold-deep); }

  .action-button.secondary{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--border);
  }
  .action-button.secondary:hover{ background:var(--cream-deep); }

    position:fixed;
    left:50%;
    bottom:28px;
    transform:translate(-50%, 12px);
    background:var(--ink);
    color:var(--cream);
    padding:14px 22px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:20;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%, 0);
  }

  footer.credit{
    text-align:center;
    margin-top:36px;
    font-size:13px;
    color:var(--ink-soft);

  "PEGAR_ORACIÓN_AQUÍ": "Escribe tu oración o frase",
  "PEGAR_INSTRUCCIÓN_DE_EDICIÓN_AQUÍ": "¿Qué quieres cambiar en la foto?",
  "PEGAR_TEXTO_Y_POSICIONES_AQUÍ": "¿Qué texto quieres añadir y dónde?",
  "PEGAR_DESCRIPCIÓN_DE_IMAGEN_AQUÍ": "Describe la imagen que quieres crear"
};

function extractFields(template) {
  const regex = /\{([^{}]+)\}/g;
  const seen = new Set();
  const fields = [];
  let match;
  while ((match = regex.exec(template)) !== null) {
    const key = match[1];
    if (!seen.has(key)) {
      seen.add(key);
      fields.push({ placeholder: key, label: FRIENDLY_LABELS[key] || "Escribe aquí" });
    }
  }
  return fields;
}

function fillTemplate(template, values) {
  let result = template;
  Object.keys(values).forEach((key) => {
    result = result.split("{" + key + "}").join(values[key] || "");
  });
  return result;
}

// ──────────────────────────────────────────────────────────
// Copiar al portapapeles + abrir Gemini
// ──────────────────────────────────────────────────────────
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (err) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      return true;
    } catch (err2) {
      return false;
    }
  }
}

function openGemini() {
  window.open("https://gemini.google.com/", "_blank", "noopener");
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
}

// ──────────────────────────────────────────────────────────
// Pantallas (sin ningún framework: se reescribe #app)
// ──────────────────────────────────────────────────────────
const app = document.getElementById("app");
let currentValues = {};

function renderHome(pushState) {
  if (pushState !== false) history.pushState({ screen: "home" }, "", "#");
  currentValues = {};
  app.innerHTML = `
    <div class="screen">
      <h2 class="screen-title">¿Qué imagen quieres crear hoy?</h2>
      <div class="button-list">
        ${PROMPTS.map(p => `
          <button class="prompt-button" data-id="${p.id}" type="button">
            <span class="emoji">${p.emoji}</span>
            <span>${p.title}</span>
          </button>
        `).join("")}
      </div>
    </div>
  `;
  app.querySelectorAll(".prompt-button").forEach(btn => {
    btn.addEventListener("click", () => renderForm(btn.dataset.id));
  });
}

function renderForm(id, pushState) {
  const prompt = PROMPTS.find(p => p.id === id);
  if (!prompt) { renderHome(); return; }
  if (pushState !== false) history.pushState({ screen: "form", id }, "", "#" + id);

  const fields = extractFields(prompt.template);
  currentValues = {};
  fields.forEach(f => { currentValues[f.placeholder] = ""; });

  app.innerHTML = `
    <div class="screen">
      <div class="back-row">
        <button class="link-back" type="button" id="backTop">← Volver</button>
      </div>
      <h2 class="screen-title">${prompt.emoji} ${prompt.title}</h2>

      ${fields.map(f => `
        <div class="field">
          <label for="f-${f.placeholder}">${f.label}</label>
          <textarea id="f-${f.placeholder}" data-key="${f.placeholder}" rows="3"></textarea>
        </div>
      `).join("")}

      ${prompt.needsPhotoNote ? `
        <div class="note-card">
          <span>📎</span>
          <span>Después de pegar este texto en Gemini, toca el clip para añadir tu foto, antes de enviar.</span>
        </div>
      ` : ""}

      <div class="actions">
        <button class="action-button primary" type="button" id="copyBtn">📋 Copiar prompt</button>
        <button class="action-button primary" type="button" id="copyOpenBtn">📋➡️ Copiar y abrir Gemini</button>
        <button class="action-button secondary" type="button" id="backBottom">← Volver</button>
      </div>
    </div>
  `;

  app.querySelectorAll("textarea[data-key]").forEach(ta => {
    ta.addEventListener("input", () => { currentValues[ta.dataset.key] = ta.value; });
  });

  const goBack = () => history.back();
  document.getElementById("backTop").addEventListener("click", goBack);
  document.getElementById("backBottom").addEventListener("click", goBack);

  document.getElementById("copyBtn").addEventListener("click", async () => {
    const text = fillTemplate(prompt.template, currentValues);
    const ok = await copyText(text);
    showToast(ok ? "¡Copiado! ✅" : "No se pudo copiar, inténtalo de nuevo");
  });

  document.getElementById("copyOpenBtn").addEventListener("click", async () => {
    const text = fillTemplate(prompt.template, currentValues);
    await copyText(text);
    openGemini();
  });
}

window.addEventListener("popstate", (e) => {
  const state = e.state;
  if (state && state.screen === "form") {
    renderForm(state.id, false);
  } else {
    renderHome(false);
  }
});

// Arranque
history.replaceState({ screen: "home" }, "", "#");
renderHome(false);
</script>
</body>
</html>
