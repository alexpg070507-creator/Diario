    width:44px;

    background:var(--card);
    color:var(--ink);

  .text-size-control button:hover{ background:var(--cream-deep); }

  .site-header h1{

    gap:16px;

    text-align:left;

    border:1px solid var(--border);
    border-radius:var(--radius);

    min-height:80px;

  .prompt-button:active{ transform:scale(0.98); box-shadow:none; }
  .prompt-button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }

    color:var(--cream);

    box-shadow:var(--shadow);

  .action-button.primary:hover{ background:#654D1A; }

  .action-button.secondary{

    color:var(--ink);
    border:1.5px solid var(--border);

  .action-button.secondary:hover{ background:var(--cream-deep); }

  .toast{
    position:fixed;
    left:50%;
    bottom:28px;
    transform:translate(-50%, 12px);
    background:var(--ink);
    color:var(--cream);
    padding:14px 22px;
    border-radius:12px;
    font-size:1rem;
    font-weight:600;

    transition:opacity .2s ease, transform .2s ease;
    z-index:20;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%, 0);

    background:var(--cream-deep);
    border:1px dashed var(--gold);

    margin-top:36px;
    font-size:0.8125rem;

La imagen debe combinar dos elementos:

1) Representación visual simbólica o artística del significado de la oración

ORACIÓN (debe aparecer literalmente en la imagen):

"{PEGAR_ORACIÓN_AQUÍ}"

ESTILO OBLIGATORIO:

- Estilo de fotografía natural y realista, como una foto real tomada con buena luz — NUNCA una ilustración, pintura, dibujo o diseño gráfico

- Estética espiritual, contemplativa y respetuosa

- Sensación de paz, calma y serenidad

- Colores naturales y con presencia real de color, ni apagados ni chillones (tonos beige, crema, dorados cálidos, azules y verdes naturales — como en una fotografía real, nunca como una ilustración plana o de dibujo animado)

- Iluminación cálida, natural y suave, como luz real de amanecer, atardecer o un día despejado

- Composición fotográfica limpia y equilibrada, ocupando todo el encuadre de borde a borde

- Tipografía moderna, cálida y amigable, como la de las imágenes de "buenos días" o frases inspiradoras que se comparten en redes sociales: combina una fuente de palo gruesa y redondeada para el cuerpo del texto con alguna palabra clave destacada en una fuente script/manuscrita más grande y decorativa como acento visual — nunca una tipografía clásica de imprenta antigua ni un estilo demasiado formal o rígido

- ABSOLUTAMENTE NO infantil (evitar cartoon, caricatura o estilo animado)

- SIN marcos, bordes decorativos, filigranas, esquinas ornamentadas ni ningún diseño de tarjeta, certificado o postal — debe verse como una fotografía real, no como un objeto de papelería

COMPOSICIÓN (VARÍA ENTRE GENERACIONES — NO REPITAS SIEMPRE EL MISMO PATRÓN):

- Siempre una fotografía real a pantalla completa de naturaleza: puede ser un paisaje amplio (cielo, montañas, campo, mar, bosque, amanecer) o, igual de válido, un primer plano de algo natural y cotidiano (una flor, una rama en flor, una escena acogedora con luz de ventana, un banco de parque con flores) — varía entre paisaje amplio y primer plano, con la oración superpuesta directamente sobre una zona despejada de esa misma foto

- ⚠️ PROHIBIDO EXPRESAMENTE: dividir la imagen en dos mitades o paneles separados — es decir, una zona con la fotografía y, junto a ella (a un lado, arriba o abajo), otra zona de color liso, degradado o distinto a la foto donde va el texto. Esto está terminantemente prohibido aunque la fotografía en sí tenga muy buena calidad: es exactamente el error a evitar, el más importante de todo este prompt

- La fotografía debe ocupar el 100% del encuadre, de borde a borde, sin ninguna excepción. El texto se escribe ENCIMA de esa fotografía, en su propio espacio, nunca en un panel independiente al lado. Piensa en un póster de cine: el título va escrito directamente sobre la imagen de fondo, nunca en un recuadro de texto separado junto a ella

- Varía el tipo de paisaje, la hora del día y el encuadre entre una generación y otra, para que no todas las imágenes se parezcan

- Si la oración menciona una figura religiosa concreta, la opción preferida y más frecuente es usar solo naturaleza simbólica sin representar ninguna figura; solo en alguna ocasión puntual (no la mayoría) puedes integrarla de forma realista y sutil dentro del paisaje — casi nunca debe ser el centro visual de la imagen

DISEÑO DEL TEXTO:

- La oración debe aparecer completa y sin cambios

- Debe ser claramente legible

- El texto va DIRECTAMENTE sobre la fotografía — nunca sobre una placa, tarjeta, rectángulo o "papel" añadido de por medio. Cero fondo extra detrás del texto, ni siquiera sutil o semitransparente

- La legibilidad se consigue solo con dos cosas: eligiendo una zona despejada y tranquila de la foto para colocar el texto (cielo, agua en calma, espacio abierto — nunca el centro de la escena ni encima de lo importante), y eligiendo un color de letra que contraste de forma natural con esa zona (letra clara sobre un cielo oscuro, letra oscura sobre una nube clara, etc.)

- Evitar distorsionar o deformar el texto

- El texto debe ser protagonista junto a la imagen, integrado en ella, nunca como un elemento pegado encima

- Se puede jugar con el tamaño del texto: una palabra o frase corta especialmente significativa (por ejemplo "Dios", o la primera exclamación de la oración) puede aparecer notablemente más grande que el resto, como acento visual — el resto del texto en un tamaño más uniforme alrededor

REGLAS IMPORTANTES:

- No añadir texto adicional aparte de la oración

- No cambiar ni resumir la oración

- Evitar exceso de elementos decorativos o sobrecarga visual

- Evitar estilos modernos, neón, futuristas o excesivamente digitales

- Si aparecen figuras religiosas, deben integrarse de forma realista y fotográfica en el paisaje (nunca como una ilustración o pintura recortada y pegada encima); si resulta demasiado complejo, mejor prescindir de la figura y usar solo paisaje simbólico

- Priorizar siempre claridad visual, serenidad y equilibrio

{NOTA_ADICIONAL}

OBJETIVO FINAL:

Crear una única fotografía natural y realista de un paisaje sereno, a pantalla completa, con la oración escrita directamente encima de esa misma foto — NUNCA dos zonas separadas (foto por un lado, texto sobre fondo liso por otro). Debe transmitir paz, respeto y belleza visual, como una foto real, nunca como una tarjeta, postal o ilustración dividida en paneles.`

// ──────────────────────────────────────────────────────────
// Sistema de detección automática de {PLACEHOLDERS} — mismo
// comportamiento que la versión Kotlin: busca {texto}, sin
// duplicados, con etiqueta amigable en español.
// ──────────────────────────────────────────────────────────
const FRIENDLY_LABELS = {
  "PEGAR_ORACIÓN_AQUÍ": "Escribe tu oración: con este texto se creará tu imagen",
  "PEGAR_INSTRUCCIÓN_DE_EDICIÓN_AQUÍ": "Cuéntame qué quieres cambiar en tu foto",
  "PEGAR_TEXTO_Y_POSICIONES_AQUÍ": "Escribe el texto que quieres añadir, y en qué parte de la foto",
  "PEGAR_DESCRIPCIÓN_DE_IMAGEN_AQUÍ": "Describe la imagen que quieres crear, con el detalle que quieras",
  "NOTA_ADICIONAL": "Notas adicionales (opcional)"
};

// Texto de ejemplo (placeholder HTML) — organizado POR PROMPT, no solo por
// nombre de campo, porque "Notas adicionales" es el mismo campo en 5 prompts
// distintos pero el ejemplo útil no es el mismo en cada uno.
const FIELD_HINTS = {
  oracion: {
    "PEGAR_ORACIÓN_AQUÍ": "Ej: Señor, gracias por este nuevo día",
    "NOTA_ADICIONAL": "Ej: que salgan animales, un paisaje de montaña…"
  },
  recrear: {
    "NOTA_ADICIONAL": "Ej: quitar la marca de agua, aclarar los colores…"
  },
  editar: {
    "PEGAR_INSTRUCCIÓN_DE_EDICIÓN_AQUÍ": "Ej: quitar las gafas, aclarar el fondo"
  },
  anadir_texto: {
    "PEGAR_TEXTO_Y_POSICIONES_AQUÍ": "Ej: Feliz cumpleaños arriba, con cariño abajo",
    "NOTA_ADICIONAL": "Ej: quitar la marca de agua, letra más grande…"
  },
  versiculo: {
    "NOTA_ADICIONAL": "Ej: que sea un versículo sobre la esperanza…"
  },
  imagen_nueva: {
    "PEGAR_DESCRIPCIÓN_DE_IMAGEN_AQUÍ": "Ej: un jardín con rosas al atardecer"
  }
};

function extractFields(template, promptId) {
  const regex = /\{([^{}]+)\}/g;
  const seen = new Set();
  const fields = [];
  let match;
  const hintsForPrompt = FIELD_HINTS[promptId] || {};
  while ((match = regex.exec(template)) !== null) {
    const key = match[1];
    if (!seen.has(key)) {
      seen.add(key);
      fields.push({
        placeholder: key,
        label: FRIENDLY_LABELS[key] || "Escribe aquí",
        hint: hintsForPrompt[key] || ""
      });
    }
  }
  return fields;
}

/**
 * Construye el bloque de "nota adicional" a partir de lo que escriba la persona.
 * Si está vacío, devuelve "" para que desaparezca por completo (encabezado incluido),
 * en vez de dejar una sección con el título puesto y nada debajo.
 */
function buildNotaAdicional(value) {
  const texto = (value || "").trim();
  if (!texto) return "";
  return `NOTA ADICIONAL DEL USUARIO:\n\nTambién quiero que: ${texto}\n`;
}

function fillTemplate(template, values) {
  let result = template;
  Object.keys(values).forEach((key) => {
    const replacement = key === "NOTA_ADICIONAL" ? buildNotaAdicional(values[key]) : (values[key] || "");
    result = result.split("{" + key + "}").join(replacement);
  });
  return result;
}

// ──────────────────────────────────────────────────────────
// Copiar al portapapeles + abrir Gemini
// ──────────────────────────────────────────────────────────
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (err) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      return true;
    } catch (err2) {
      return false;
    }
  }
}

function openGemini() {
  window.open("https://gemini.google.com/", "_blank", "noopener");
}

function openChatGPT() {
  window.open("https://chatgpt.com/", "_blank", "noopener");
}

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
}

// ──────────────────────────────────────────────────────────
// Pantallas (sin ningún framework: se reescribe #app)
// ──────────────────────────────────────────────────────────
const app = document.getElementById("app");
let currentValues = {};
let lastCopied = null; // { id, title, emoji, text } — se pierde al recargar la página, a propósito

function rememberCopy(prompt, text) {
  lastCopied = { id: prompt.id, title: prompt.title, emoji: prompt.emoji, text };
}

function showManualCopyFallback(text) {
  const box = document.getElementById("manualCopyBox");
  const ta = document.getElementById("manualCopyText");
  if (!box || !ta) return;
  ta.value = text;
  box.hidden = false;
  ta.focus();
  ta.select();
}

function hideManualCopyFallback() {
  const box = document.getElementById("manualCopyBox");
  if (box) box.hidden = true;
}

function renderHome(pushState) {
  if (pushState !== false) history.pushState({ screen: "home" }, "", "#");
  currentValues = {};
  app.innerHTML = `
    <div class="screen">
      <div class="home-top-row">
        <h2 class="screen-title">¿Qué imagen quieres crear hoy?</h2>
        <button class="link-back help-link" type="button" id="helpLink">❓ Cómo se usa</button>
      </div>
      ${lastCopied ? `
        <button class="prompt-button recopy-button" type="button" id="recopyBtn">
          <span class="emoji">🔁</span>
          <span>Volver a copiar: ${lastCopied.title}</span>
        </button>
      ` : ""}
      <div class="button-list">
        ${PROMPTS.map(p => `
          <button class="prompt-button" data-id="${p.id}" type="button">
            <span class="emoji">${p.emoji}</span>
            <span>${p.title}</span>
          </button>
        `).join("")}
      </div>
    </div>
  `;
  app.querySelectorAll(".prompt-button[data-id]").forEach(btn => {
    btn.addEventListener("click", () => renderForm(btn.dataset.id));
  });
  document.getElementById("helpLink").addEventListener("click", () => renderHelp());
  const recopyBtn = document.getElementById("recopyBtn");
  if (recopyBtn) {
    recopyBtn.addEventListener("click", async () => {
      const ok = await copyText(lastCopied.text);
      showToast(ok ? "¡Copiado de nuevo! ✅" : "No se pudo copiar, inténtalo de nuevo");
      if (!ok) showManualCopyFallback(lastCopied.text);
    });
  }
}

function renderHelp(pushState) {
  if (pushState !== false) history.pushState({ screen: "help" }, "", "#ayuda");
  app.innerHTML = `
    <div class="screen">
      <div class="back-row">
        <button class="link-back" type="button" id="backTop">← Volver</button>
      </div>
      <h2 class="screen-title">❓ Cómo se usa esta app</h2>

      <ol class="help-steps">
        <li><strong>Toca uno de los botones</strong> de la pantalla de inicio, según el tipo de imagen que quieras.</li>
        <li>Si te pide que <strong>escribas algo</strong>, hazlo en el recuadro. El de "Notas adicionales" es opcional, puedes dejarlo vacío.</li>
        <li>Si en la pantalla aparece el aviso 📎, significa que <strong>tendrás que adjuntar una foto</strong> tú misma, un poco más adelante en Gemini o ChatGPT.</li>
        <li>Toca <strong>"Copiar y abrir Gemini"</strong> o <strong>"Copiar y abrir ChatGPT"</strong> — se copia el texto solo y se abre la app.</li>
        <li>Dentro de Gemini o ChatGPT, mantén el dedo sobre el cuadro donde se escribe y elige <strong>"Pegar"</strong>. Si hacía falta una foto, tócala para añadirla ahí también.</li>
        <li>Pulsa enviar, y espera unos segundos a que aparezca tu imagen.</li>
      </ol>

      <div class="note-card">
        <span>💡</span>
        <span>Si generaste algo y necesitas copiarlo otra vez, vuelve al inicio: ahí aparece un botón para volver a copiar lo último, sin tener que rellenar nada de nuevo.</span>
      </div>

      <div class="actions">
        <button class="action-button secondary" type="button" id="backBottomHelp">← Volver al inicio</button>
      </div>
    </div>
  `;
  const goBack = () => history.back();
  document.getElementById("backTop").addEventListener("click", goBack);
  document.getElementById("backBottomHelp").addEventListener("click", goBack);
}

function renderForm(id, pushState) {
  const prompt = PROMPTS.find(p => p.id === id);
  if (!prompt) { renderHome(); return; }
  if (pushState !== false) history.pushState({ screen: "form", id }, "", "#" + id);

  const fields = extractFields(prompt.template, prompt.id);
  currentValues = {};
  fields.forEach(f => { currentValues[f.placeholder] = ""; });

  app.innerHTML = `
    <div class="screen">
      <div class="back-row">
        <button class="link-back" type="button" id="backTop">← Volver</button>
      </div>
      <h2 class="screen-title">${prompt.emoji} ${prompt.title}</h2>

      ${fields.map(f => `
        <div class="field">
          <label for="f-${f.placeholder}">${f.label}</label>
          <textarea id="f-${f.placeholder}" data-key="${f.placeholder}" rows="3" placeholder="${f.hint || ""}"></textarea>
        </div>
      `).join("")}

      ${prompt.needsPhotoNote ? `
        <div class="note-card">
          <span>📎</span>
          <span>Después de pegar este texto en Gemini o ChatGPT, adjunta tu foto antes de enviar.</span>
        </div>
      ` : ""}

      <div class="actions">
        <button class="action-button primary" type="button" id="copyBtn">📋 Copiar prompt</button>
        <button class="action-button primary" type="button" id="copyOpenBtn">📋➡️ Copiar y abrir Gemini</button>
        <button class="action-button primary" type="button" id="copyOpenChatGptBtn">📋➡️ Copiar y abrir ChatGPT</button>
        <button class="action-button secondary" type="button" id="backBottom">← Volver</button>
      </div>

      <div class="manual-copy" id="manualCopyBox" hidden>
        <p>No se pudo copiar automáticamente. Mantén el dedo sobre el texto de abajo y elige "Copiar":</p>
        <textarea id="manualCopyText" readonly rows="4"></textarea>
      </div>
    </div>
  `;

  app.querySelectorAll("textarea[data-key]").forEach(ta => {
    ta.addEventListener("input", () => { currentValues[ta.dataset.key] = ta.value; });
  });

  const goBack = () => history.back();
  document.getElementById("backTop").addEventListener("click", goBack);
  document.getElementById("backBottom").addEventListener("click", goBack);

  document.getElementById("copyBtn").addEventListener("click", async () => {
    const text = fillTemplate(prompt.template, currentValues);
    const ok = await copyText(text);
    showToast(ok ? "¡Copiado! ✅" : "No se pudo copiar, inténtalo de nuevo");
    if (ok) { rememberCopy(prompt, text); hideManualCopyFallback(); }
    else { showManualCopyFallback(text); }
  });

  document.getElementById("copyOpenBtn").addEventListener("click", async () => {
    const text = fillTemplate(prompt.template, currentValues);
    const ok = await copyText(text);
    if (ok) { rememberCopy(prompt, text); hideManualCopyFallback(); }
    else { showManualCopyFallback(text); }
    openGemini();
  });

  document.getElementById("copyOpenChatGptBtn").addEventListener("click", async () => {
    const text = fillTemplate(prompt.template, currentValues);
    const ok = await copyText(text);
    if (ok) { rememberCopy(prompt, text); hideManualCopyFallback(); }
    else { showManualCopyFallback(text); }
    openChatGPT();
  });
}

window.addEventListener("popstate", (e) => {
  const state = e.state;
  if (state && state.screen === "form") {
    renderForm(state.id, false);
  } else if (state && state.screen === "help") {
    renderHelp(false);
  } else {
    renderHome(false);
  }
});

// ──────────────────────────────────────────────────────────
// Control de tamaño de letra (A- / A+): al ser rem en vez de px,
// cambiar el font-size del <html> escala todo el texto de la app
// proporcionalmente. Se reinicia al 100% cada vez que se abre la
// app (a propósito: sin guardar nada entre sesiones).
// ──────────────────────────────────────────────────────────
const FONT_STEP = 12.5;   // puntos porcentuales por toque
const FONT_MIN = 87.5;
const FONT_MAX = 137.5;
let fontScale = 100;

function applyFontScale() {
  document.documentElement.style.fontSize = fontScale + "%";
}

document.getElementById("fontSmaller").addEventListener("click", () => {
  fontScale = Math.max(FONT_MIN, fontScale - FONT_STEP);
  applyFontScale();
});
document.getElementById("fontBigger").addEventListener("click", () => {
  fontScale = Math.min(FONT_MAX, fontScale + FONT_STEP);
  applyFontScale();
});

// Arranque
history.replaceState({ screen: "home" }, "", "#");
renderHome(false);

// Service worker para poder abrir sin conexión (opcional: si el navegador
// no lo soporta, o si falla el registro por lo que sea, la app funciona
// exactamente igual, solo que sin caché offline).
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {
      // Silencioso a propósito: sin conexión offline no es un error para
      // el usuario, la app funciona igual mientras haya internet.
    });
  });
}
